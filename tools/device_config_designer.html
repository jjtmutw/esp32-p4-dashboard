<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JJ Dashboard Config Designer</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-2: #eef3f8;
      --ink: #15202b;
      --muted: #627180;
      --line: #d7e0ea;
      --accent: #0b8f8a;
      --accent-2: #2f6fbd;
      --accent-soft: #dff7f5;
      --warn: #b7791f;
      --danger: #bd2f38;
      --ok: #12805c;
      --shadow: 0 16px 42px rgba(21, 32, 43, 0.11);
      --radius: 8px;
      color-scheme: light;
      font-family: "Noto Sans TC", "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, #eef6f7 0, rgba(238, 246, 247, 0) 260px),
        var(--bg);
      color: var(--ink);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(360px, 440px) minmax(520px, 1fr) minmax(360px, 480px);
      gap: 18px;
      padding: 18px;
    }

    .panel {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .left-panel,
    .right-panel {
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 36px);
      overflow: hidden;
    }

    .center-panel {
      display: flex;
      flex-direction: column;
      min-height: calc(100vh - 36px);
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.86);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .mark {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 0;
    }

    .title-block {
      min-width: 0;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: 17px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .sub {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      margin-top: 3px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }

    .btn {
      height: 34px;
      padding: 0 12px;
      border-radius: 7px;
      background: var(--surface-2);
      color: var(--ink);
      border: 1px solid var(--line);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .btn:hover {
      border-color: #b9c9d8;
      background: #e7eef5;
    }

    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .btn.primary:hover {
      background: #087b77;
    }

    .btn.warn {
      background: #fff6e7;
      border-color: #efd29c;
      color: #855d16;
    }

    .btn.danger {
      background: #fff0f1;
      border-color: #efb9bd;
      color: var(--danger);
    }

    .btn.icon {
      width: 34px;
      padding: 0;
      display: grid;
      place-items: center;
      font-size: 16px;
    }

    .scroll {
      overflow: auto;
      padding: 16px;
    }

    .group {
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: var(--radius);
      margin-bottom: 14px;
      overflow: hidden;
    }

    .group-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      background: #f8fafc;
      border-bottom: 1px solid var(--line);
    }

    .group-title h2 {
      font-size: 14px;
      line-height: 1.2;
    }

    .count {
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 14px;
    }

    .form-grid.single {
      grid-template-columns: 1fr;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      color: #304150;
      font-size: 12px;
      line-height: 1.2;
      font-weight: 800;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid #cbd6e2;
      background: #fff;
      color: var(--ink);
      border-radius: 7px;
      min-height: 38px;
      padding: 8px 10px;
      outline: none;
      font-size: 13px;
      line-height: 1.35;
    }

    textarea {
      min-height: 88px;
      resize: vertical;
      font-family: "Cascadia Mono", Consolas, monospace;
      font-size: 12px;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(11, 143, 138, 0.14);
    }

    .check-row {
      display: flex;
      align-items: center;
      gap: 9px;
      min-height: 38px;
    }

    .check-row input {
      width: 18px;
      height: 18px;
      min-height: 18px;
      accent-color: var(--accent);
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      background: #f8fafc;
    }

    .tab {
      height: 38px;
      border-radius: 7px;
      background: transparent;
      color: #3a4c5c;
      font-weight: 800;
      border: 1px solid transparent;
    }

    .tab.active {
      background: var(--accent-soft);
      color: #065e5b;
      border-color: #a8e5df;
    }

    .card-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .editor-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      overflow: hidden;
    }

    .editor-card.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(11, 143, 138, 0.12);
    }

    .editor-card-head {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      background: #fbfcfe;
      color: inherit;
      text-align: left;
      border-bottom: 1px solid var(--line);
    }

    .editor-card-head strong {
      display: block;
      font-size: 13px;
      line-height: 1.2;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .editor-card-head span {
      color: var(--muted);
      font-size: 12px;
    }

    .card-mini-actions {
      display: flex;
      gap: 6px;
      flex: 0 0 auto;
    }

    .mini-btn {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: #fff;
      color: #425466;
      font-weight: 800;
    }

    .mini-btn:hover {
      background: var(--surface-2);
    }

    .editor-card-body {
      padding: 12px;
    }

    .empty {
      min-height: 120px;
      border: 1px dashed #bac9d6;
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      font-weight: 700;
      padding: 18px;
      background: #fbfdff;
    }

    .preview-wrap {
      display: grid;
      place-items: center;
      padding: 18px;
      overflow: auto;
      background:
        linear-gradient(90deg, rgba(21, 32, 43, 0.06) 1px, transparent 1px),
        linear-gradient(rgba(21, 32, 43, 0.06) 1px, transparent 1px),
        #edf2f7;
      background-size: 28px 28px;
      flex: 1;
    }

    .device-preview {
      width: min(720px, 100%);
      aspect-ratio: 1 / 1;
      background: #101923;
      border: 10px solid #18232f;
      border-radius: 8px;
      box-shadow: 0 24px 50px rgba(21, 32, 43, 0.25);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .screen-bar {
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      color: #fff;
      background: #1f2934;
      font-weight: 800;
      font-size: 18px;
    }

    .screen-status {
      display: flex;
      gap: 12px;
      color: #46ff8a;
      font-size: 15px;
      align-items: center;
    }

    .screen-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      height: 62px;
      background: #fff;
      border-bottom: 1px solid #d6e1ec;
    }

    .screen-tab {
      display: grid;
      place-items: center;
      color: #516273;
      font-weight: 800;
      font-size: 17px;
      border-bottom: 4px solid transparent;
    }

    .screen-tab.active {
      color: #0b7085;
      background: #eaf7fb;
      border-color: #19a6d4;
    }

    .screen-content {
      flex: 1;
      background: #f4f8fb;
      padding: 18px;
      overflow: hidden;
    }

    .preview-grid {
      display: grid;
      gap: 14px;
      height: 100%;
    }

    .preview-grid.controls,
    .preview-grid.sensors {
      grid-template-columns: repeat(3, 1fr);
      grid-auto-rows: 1fr;
    }

    .preview-grid.cameras {
      grid-template-columns: 1fr;
      grid-auto-rows: 1fr;
    }

    .dash-card {
      border-radius: 8px;
      background: #fff;
      border: 1px solid #d8e3ed;
      box-shadow: 0 8px 20px rgba(21, 32, 43, 0.10);
      padding: 14px;
      min-width: 0;
      overflow: hidden;
      position: relative;
    }

    .dash-card.dim {
      opacity: 0.45;
    }

    .dash-name {
      font-size: 18px;
      font-weight: 900;
      color: #1c2c39;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dash-sub {
      color: #708090;
      font-size: 13px;
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dash-pill {
      position: absolute;
      right: 12px;
      bottom: 12px;
      height: 34px;
      min-width: 64px;
      border-radius: 7px;
      display: grid;
      place-items: center;
      color: #fff;
      background: #16a7d7;
      font-size: 12px;
      font-weight: 900;
    }

    .sensor-value {
      font-size: 34px;
      line-height: 1;
      margin-top: 18px;
      font-weight: 950;
      color: #0b6c68;
    }

    .sensor-unit {
      color: #516273;
      font-size: 18px;
      font-weight: 800;
      margin-left: 4px;
    }

    .camera-frame {
      height: calc(100% - 52px);
      border-radius: 7px;
      background:
        linear-gradient(135deg, rgba(11, 143, 138, 0.24), rgba(47, 111, 189, 0.16)),
        #263746;
      display: grid;
      place-items: center;
      color: rgba(255,255,255,0.8);
      font-weight: 900;
      font-size: 28px;
      margin-bottom: 12px;
    }

    .json-box {
      display: flex;
      flex-direction: column;
      min-height: 0;
      flex: 1;
    }

    .json-toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: #f8fafc;
    }

    .json-output {
      flex: 1;
      min-height: 260px;
      border: 0;
      border-radius: 0;
      resize: none;
      background: #101923;
      color: #d7f7ef;
      padding: 14px;
      line-height: 1.55;
    }

    .status {
      min-height: 38px;
      padding: 10px 12px;
      font-size: 13px;
      color: var(--muted);
      border-top: 1px solid var(--line);
      background: #fff;
    }

    .status.ok {
      color: var(--ok);
    }

    .status.warn {
      color: var(--warn);
    }

    .status.error {
      color: var(--danger);
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 1280px) {
      .app {
        grid-template-columns: 390px minmax(520px, 1fr);
      }

      .right-panel {
        grid-column: 1 / -1;
        max-height: none;
      }
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
        padding: 10px;
      }

      .left-panel,
      .center-panel,
      .right-panel {
        max-height: none;
        min-height: auto;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .device-preview {
        width: min(620px, 100%);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel left-panel">
      <header class="panel-header">
        <div class="brand">
          <div class="mark">JJ</div>
          <div class="title-block">
            <h1>裝置 JSON 設定器</h1>
            <p class="sub">ESP32-P4 Dashboard</p>
          </div>
        </div>
        <button class="btn icon" id="randomIdBtn" title="產生 8 位 ID">↻</button>
      </header>

      <div class="scroll">
        <section class="group">
          <div class="group-title">
            <h2>裝置</h2>
            <span class="count" id="deviceValidity">ID</span>
          </div>
          <div class="form-grid">
            <div class="field">
              <label for="deviceId">Device ID</label>
              <input id="deviceId" maxlength="8" autocomplete="off">
            </div>
            <div class="field">
              <label for="version">Version</label>
              <input id="version" type="number" min="1" step="1">
            </div>
            <div class="field full">
              <label for="deviceName">裝置名稱</label>
              <input id="deviceName" autocomplete="off">
            </div>
            <div class="field full">
              <label for="title">標題列</label>
              <input id="title" autocomplete="off">
            </div>
          </div>
        </section>

        <section class="group">
          <div class="group-title">
            <h2>Wi-Fi</h2>
            <span class="count">setup</span>
          </div>
          <div class="form-grid">
            <div class="field">
              <label for="wifiSsid">SSID</label>
              <input id="wifiSsid" autocomplete="off">
            </div>
            <div class="field">
              <label for="wifiPassword">Password</label>
              <input id="wifiPassword" type="password" autocomplete="new-password">
            </div>
          </div>
        </section>

        <section class="group">
          <div class="group-title">
            <h2>MQTT</h2>
            <span class="count">broker</span>
          </div>
          <div class="form-grid">
            <div class="field full">
              <label for="mqttBroker">MQTT Broker</label>
              <input id="mqttBroker" autocomplete="off">
            </div>
            <div class="field">
              <label for="mqttId">MQTT ID</label>
              <input id="mqttId" autocomplete="off">
            </div>
            <div class="field">
              <label for="mqttPassword">MQTT Password</label>
              <input id="mqttPassword" type="password" autocomplete="new-password">
            </div>
            <div class="field full">
              <label for="configTopic">Config Topic</label>
              <input id="configTopic" readonly>
            </div>
          </div>
        </section>
      </div>
    </section>

    <section class="panel center-panel">
      <header class="panel-header">
        <div class="title-block">
          <h1>卡片設定</h1>
          <p class="sub" id="sectionSummary">Controls 0 / 12</p>
        </div>
        <div class="actions">
          <button class="btn" data-section="controls">Controls</button>
          <button class="btn" data-section="sensors">Sensors</button>
          <button class="btn" data-section="cameras">Cameras</button>
          <button class="btn primary" id="addCardBtn">新增卡片</button>
        </div>
      </header>

      <div class="tabs" aria-label="sections">
        <button class="tab active" data-section-tab="controls">Controls</button>
        <button class="tab" data-section-tab="sensors">Sensors</button>
        <button class="tab" data-section-tab="cameras">Cameras</button>
      </div>

      <div class="preview-wrap">
        <div class="device-preview">
          <div class="screen-bar">
            <div id="previewTitle">JJ辦公室控制器</div>
            <div class="screen-status"><span>WiFi</span><span>MQTT</span><span>⚙</span></div>
          </div>
          <div class="screen-tabs">
            <div class="screen-tab active" data-preview-tab="controls">Controls</div>
            <div class="screen-tab" data-preview-tab="sensors">Sensors</div>
            <div class="screen-tab" data-preview-tab="cameras">Cameras</div>
          </div>
          <div class="screen-content">
            <div id="dashboardPreview" class="preview-grid controls"></div>
          </div>
        </div>
      </div>
    </section>

    <section class="panel right-panel">
      <header class="panel-header">
        <div class="title-block">
          <h1>JSON</h1>
          <p class="sub" id="fileNameHint">config/devices/device_id.json</p>
        </div>
        <div class="actions">
          <label class="btn" for="importFile">匯入</label>
          <input id="importFile" class="hidden" type="file" accept="application/json,.json">
          <button class="btn" id="loadSampleBtn">範例</button>
        </div>
      </header>

      <div class="json-box">
        <div class="json-toolbar">
          <button class="btn primary" id="downloadBtn">儲存 JSON</button>
          <button class="btn" id="copyBtn">複製</button>
          <button class="btn" id="formatBtn">整理</button>
          <button class="btn warn" id="bumpBtn">版本 +1</button>
        </div>
        <textarea id="jsonOutput" class="json-output" spellcheck="false"></textarea>
        <div id="status" class="status">Ready</div>
      </div>
    </section>
  </main>

  <template id="controlEditorTemplate">
    <div class="form-grid">
      <div class="field">
        <label>Visible</label>
        <div class="check-row"><input data-field="visible" type="checkbox"><span>顯示</span></div>
      </div>
      <div class="field">
        <label>Type</label>
        <select data-field="type">
          <option value="onoff">onoff</option>
          <option value="message">message</option>
          <option value="toggle">toggle</option>
          <option value="url">url</option>
        </select>
      </div>
      <div class="field">
        <label>ID</label>
        <input data-field="id">
      </div>
      <div class="field">
        <label>Name</label>
        <input data-field="name">
      </div>
      <div class="field full">
        <label>Subtitle</label>
        <input data-field="subtitle">
      </div>
      <div class="field control-url full">
        <label>URL</label>
        <textarea data-field="url"></textarea>
      </div>
      <div class="field control-onoff full">
        <label>URL ON</label>
        <textarea data-field="urlon"></textarea>
      </div>
      <div class="field control-onoff full">
        <label>URL OFF</label>
        <textarea data-field="urloff"></textarea>
      </div>
      <div class="field control-mqtt">
        <label>MQTT Topic</label>
        <input data-field="topic">
      </div>
      <div class="field control-mqtt">
        <label>Device</label>
        <input data-field="device">
      </div>
      <div class="field control-mqtt">
        <label>Switch</label>
        <input data-field="switch">
      </div>
      <div class="field control-mqtt">
        <label>Toggle CMD</label>
        <input data-field="cmd_toggle">
      </div>
      <div class="field control-mqtt">
        <label>ON CMD</label>
        <input data-field="cmd_on">
      </div>
      <div class="field control-mqtt">
        <label>OFF CMD</label>
        <input data-field="cmd_off">
      </div>
    </div>
  </template>

  <template id="sensorEditorTemplate">
    <div class="form-grid">
      <div class="field">
        <label>Visible</label>
        <div class="check-row"><input data-field="visible" type="checkbox"><span>顯示</span></div>
      </div>
      <div class="field">
        <label>Label</label>
        <input data-field="label">
      </div>
      <div class="field">
        <label>Unit</label>
        <input data-field="unit">
      </div>
      <div class="field">
        <label>Key</label>
        <input data-field="key">
      </div>
      <div class="field full">
        <label>Topic</label>
        <input data-field="topic">
      </div>
      <div class="field full">
        <label>device_id</label>
        <input data-field="device_id">
      </div>
      <div class="field">
        <label>Preview Value</label>
        <input data-field="value">
      </div>
    </div>
  </template>

  <template id="cameraEditorTemplate">
    <div class="form-grid">
      <div class="field">
        <label>Visible</label>
        <div class="check-row"><input data-field="visible" type="checkbox"><span>顯示</span></div>
      </div>
      <div class="field">
        <label>Label</label>
        <input data-field="label">
      </div>
      <div class="field full">
        <label>DEVICE_ID</label>
        <input data-field="device_id">
      </div>
      <div class="field full">
        <label>Topic</label>
        <input data-field="topic">
      </div>
      <div class="field full">
        <label>Stream URL</label>
        <input data-field="url">
      </div>
    </div>
  </template>

  <script>
    const LIMITS = { controls: 12, sensors: 12, cameras: 4 };
    const STORAGE_KEY = "jj-dashboard-config-designer";

    function clone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function normalizeImportedConfig(input) {
      const next = clone(defaultState);
      next.device_id = safeString(input.device_id, next.device_id);
      next.device_name = safeString(input.device_name || input.name, next.device_name);
      next.version = Number(input.version || next.version);
      next.title = safeString(input.title, next.title);
      next.wifi.ssid = safeString(input.wifi?.ssid || input.ssid, "");
      next.wifi.password = safeString(input.wifi?.password || input.password, "");
      next.mqtt.broker = safeString(input.mqtt?.broker || input.mqtt?.uri || input.mqtt || input.mqtt_broker, next.mqtt.broker);
      next.mqtt.mqtt_id = safeString(input.mqtt?.mqtt_id || input.mqtt?.username || input.mqtt_id, "");
      next.mqtt.mqtt_password = safeString(input.mqtt?.mqtt_password || input.mqtt?.password || input.mqtt_password, "");
      next.mqtt.request_topic = safeString(input.mqtt?.request_topic, next.mqtt.request_topic);
      next.mqtt.response_prefix = safeString(input.mqtt?.response_prefix, next.mqtt.response_prefix);
      next.controls = Array.isArray(input.controls) ? input.controls.slice(0, LIMITS.controls).map(normalizeControl) : [];
      next.sensors = Array.isArray(input.sensors) ? input.sensors.slice(0, LIMITS.sensors).map(normalizeSensor) : [];
      next.cameras = Array.isArray(input.cameras) ? input.cameras.slice(0, LIMITS.cameras).map(normalizeCamera) : [];
      return next;
    }

    function normalizeControl(item, index = 0) {
      const type = safeString(item.type || item.action || item.control_type, "message");
      return {
        id: safeString(item.id, `control_${index + 1}`),
        name: safeString(item.name || item.label, `控制 ${index + 1}`),
        subtitle: safeString(item.subtitle, ""),
        category: "button",
        type,
        topic: safeString(item.topic || item.mqtt_topic, "JJ/iot/cmd"),
        device: safeString(item.device, ""),
        switch: safeString(item.switch, ""),
        cmd_on: safeString(item.cmd_on, "on"),
        cmd_off: safeString(item.cmd_off, "off"),
        cmd_toggle: safeString(item.cmd_toggle || item.cmd, "toggle"),
        url: safeString(item.url, ""),
        urlon: safeString(item.urlon || item.url_on, ""),
        urloff: safeString(item.urloff || item.url_off, ""),
        visible: item.visible !== false
      };
    }

    function normalizeSensor(item, index = 0) {
      return {
        label: safeString(item.label || item.Label || item.name, `感測 ${index + 1}`),
        unit: safeString(item.unit || item.Unit, ""),
        topic: safeString(item.topic || item.Topic, "jj/sensor/state"),
        key: safeString(item.key || item.Key, ""),
        device_id: safeString(item.device_id || item.DEVICE_ID, ""),
        value: safeString(item.value, "--"),
        visible: item.visible !== false
      };
    }

    function normalizeCamera(item, index = 0) {
      return {
        label: safeString(item.label || item.Label || item.name, `Camera ${index + 1}`),
        device_id: safeString(item.device_id || item.DEVICE_ID, ""),
        topic: safeString(item.topic || item.Topic, "jj/camera/image"),
        url: safeString(item.url, ""),
        visible: item.visible !== false
      };
    }

    function safeString(value, fallback = "") {
      return typeof value === "string" ? value : fallback;
    }

    function bindBaseFields() {
      [
        ["deviceId", "device_id"],
        ["deviceName", "device_name"],
        ["title", "title"]
      ].forEach(([id, key]) => {
        els[id].addEventListener("input", () => {
          state[key] = els[id].value;
          render();
        });
      });

      els.version.addEventListener("input", () => {
        state.version = Math.max(1, Number(els.version.value || 1));
        render();
      });

      els.wifiSsid.addEventListener("input", () => {
        state.wifi.ssid = els.wifiSsid.value;
        render();
      });
      els.wifiPassword.addEventListener("input", () => {
        state.wifi.password = els.wifiPassword.value;
        render();
      });
      els.mqttBroker.addEventListener("input", () => {
        state.mqtt.broker = els.mqttBroker.value;
        render();
      });
      els.mqttId.addEventListener("input", () => {
        state.mqtt.mqtt_id = els.mqttId.value;
        render();
      });
      els.mqttPassword.addEventListener("input", () => {
        state.mqtt.mqtt_password = els.mqttPassword.value;
        render();
      });
    }

    function setActiveSection(section) {
      activeSection = section;
      selected[section] = Math.min(selected[section] || 0, Math.max(0, state[section].length - 1));
      render();
    }

    function addCard() {
      const list = state[activeSection];
      if (list.length >= LIMITS[activeSection]) {
        setStatus(`${sectionLabel(activeSection)} 已達上限 ${LIMITS[activeSection]}`, "warn");
        return;
      }
      if (activeSection === "controls") list.push(normalizeControl({}, list.length));
      if (activeSection === "sensors") list.push(normalizeSensor({}, list.length));
      if (activeSection === "cameras") list.push(normalizeCamera({}, list.length));
      selected[activeSection] = list.length - 1;
      render();
    }

    function removeCard(section, index) {
      state[section].splice(index, 1);
      selected[section] = Math.max(0, Math.min(selected[section], state[section].length - 1));
      render();
    }

    function duplicateCard(section, index) {
      const list = state[section];
      if (list.length >= LIMITS[section]) {
        setStatus(`${sectionLabel(section)} 已達上限 ${LIMITS[section]}`, "warn");
        return;
      }
      const copy = clone(list[index]);
      if (copy.id) copy.id = `${copy.id}_copy`.slice(0, 31);
      if (copy.name) copy.name = `${copy.name} copy`.slice(0, 31);
      if (copy.label) copy.label = `${copy.label} copy`.slice(0, 31);
      list.splice(index + 1, 0, copy);
      selected[section] = index + 1;
      render();
    }

    function moveCard(section, index, delta) {
      const list = state[section];
      const nextIndex = index + delta;
      if (nextIndex < 0 || nextIndex >= list.length) return;
      const [item] = list.splice(index, 1);
      list.splice(nextIndex, 0, item);
      selected[section] = nextIndex;
      render();
    }

    function makeConfig() {
      const config = {

          ssid: state.wifi.ssid,
          password: state.wifi.password
        },
        mqtt: {

          mqtt_password: state.mqtt.mqtt_password,

          response_prefix: state.mqtt.response_prefix

        mqtt_id: state.mqtt.mqtt_id,
        mqtt_password: state.mqtt.mqtt_password,
        controls: state.controls.map(toControlJson),

      attachTextImage(config, "title_image", config.title, {

    function attachTextImage(target, key, text, options) {
      if (!needsTextImage(text)) {
        delete target[key];
        return;
      }
      const image = makeTextImage(text, options);
      if (image) target[key] = image;
    }

    function needsTextImage(text) {
      return /[^\x00-\x7f]/.test(String(text || ""));
    }

    function makeTextImage(text, options = {}) {
      const cleanText = String(text || "").trim();
      if (!cleanText) return null;

      const fontSize = Number(options.fontSize || 16);
      const weight = Number(options.weight || 700);
      const maxWidth = Math.max(1, Number(options.maxWidth || 220));
      const color = options.color || "#ffffff";
      const lineHeight = Math.ceil(fontSize * 1.55);
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      ctx.font = `${weight} ${fontSize}px ${TEXT_IMAGE_FONT}`;
      const measured = Math.ceil(ctx.measureText(cleanText).width) + 6;
      canvas.width = Math.max(1, Math.min(maxWidth, measured));
      canvas.height = lineHeight;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.font = `${weight} ${fontSize}px ${TEXT_IMAGE_FONT}`;
      ctx.fillStyle = "#ffffff";
      ctx.textBaseline = "middle";
      ctx.fillText(cleanText, 1, Math.floor(canvas.height / 2));

      const source = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const crop = findAlphaCrop(source, 2);
      if (!crop) return null;

      const width = crop.x2 - crop.x1 + 1;
      const height = crop.y2 - crop.y1 + 1;
      const pixels = new Uint8Array(width * height);
      let out = 0;
      for (let y = crop.y1; y <= crop.y2; y++) {
        for (let x = crop.x1; x <= crop.x2; x++) {
          const alpha = source.data[(y * source.width + x) * 4 + 3];
          pixels[out++] = TEXT_IMAGE_FORMAT === "a1_rle"
            ? (alpha >= 96 ? 1 : 0)
            : Math.max(0, Math.min(15, Math.round(alpha / 17)));
        }
      }

      const rle = encodeTextImageRle(pixels);
      return {
        format: TEXT_IMAGE_FORMAT,
        width,
        height,
        color,
        data: bytesToBase64(rle)
      };
    }

    function findAlphaCrop(imageData, pad = 1) {
      let x1 = imageData.width;
      let y1 = imageData.height;
      let x2 = -1;
      let y2 = -1;
      for (let y = 0; y < imageData.height; y++) {
        for (let x = 0; x < imageData.width; x++) {
          const alpha = imageData.data[(y * imageData.width + x) * 4 + 3];
          if (alpha > 2) {
            x1 = Math.min(x1, x);
            y1 = Math.min(y1, y);
            x2 = Math.max(x2, x);
            y2 = Math.max(y2, y);
          }
        }
      }
      if (x2 < x1 || y2 < y1) return null;
      return {
        x1: Math.max(0, x1 - pad),
        y1: Math.max(0, y1 - pad),
        x2: Math.min(imageData.width - 1, x2 + pad),
        y2: Math.min(imageData.height - 1, y2 + pad)
      };
    }

    function encodeTextImageRle(pixels) {
      const out = [];
      let index = 0;
      while (index < pixels.length) {
        const value = TEXT_IMAGE_FORMAT === "a1_rle" ? (pixels[index] ? 1 : 0) : (pixels[index] & 0x0f);
        let run = 1;
        while (index + run < pixels.length && run < 255) {
          const next = TEXT_IMAGE_FORMAT === "a1_rle" ? (pixels[index + run] ? 1 : 0) : (pixels[index + run] & 0x0f);
          if (next !== value) break;
          run++;
        }
        out.push(run, value);
        index += run;
      }
      return new Uint8Array(out);
    }

    function bytesToBase64(bytes) {
      let binary = "";
      const chunkSize = 0x8000;
      for (let i = 0; i < bytes.length; i += chunkSize) {
        binary += String.fromCharCode(...bytes.subarray(i, i + chunkSize));
      }
      return btoa(binary);
    }

    function render() {
      renderBaseFields();
      renderSectionTabs();
      renderPreview();
      renderEditor();
      renderJson();
      saveDraft();
    }

    function renderBaseFields() {
      setValue(els.deviceId, state.device_id);
      setValue(els.deviceName, state.device_name);
      setValue(els.version, state.version);
      setValue(els.title, state.title);
      setValue(els.wifiSsid, state.wifi.ssid);
      setValue(els.wifiPassword, state.wifi.password);
      setValue(els.mqttBroker, state.mqtt.broker);
      setValue(els.mqttId, state.mqtt.mqtt_id);
      setValue(els.mqttPassword, state.mqtt.mqtt_password);
      const topic = `${state.mqtt.response_prefix || "jj/dashboard/config"}/${state.device_id || "device_id"}`;
      setValue(els.configTopic, topic);
      els.previewTitle.textContent = state.title || "JJ辦公室控制器";
      els.fileNameHint.textContent = `config/devices/${state.device_id || "device_id"}.json`;
      const valid = idPattern.test(state.device_id);
      els.deviceValidity.textContent = valid ? "OK" : "8 位英數";
      els.deviceValidity.style.color = valid ? "var(--ok)" : "var(--danger)";
    }

    function renderSectionTabs() {
      document.querySelectorAll("[data-section], [data-section-tab]").forEach(btn => {
        const section = btn.dataset.section || btn.dataset.sectionTab;
        btn.classList.toggle("active", section === activeSection);
        if (btn.dataset.section) {
          btn.classList.toggle("primary", section === activeSection);
        }
      });
      document.querySelectorAll("[data-preview-tab]").forEach(tab => {
        tab.classList.toggle("active", tab.dataset.previewTab === activeSection);
      });
      els.sectionSummary.textContent = `${sectionLabel(activeSection)} ${state[activeSection].length} / ${LIMITS[activeSection]}`;
    }

    function renderPreview() {
      const list = state[activeSection].filter(item => item.visible !== false);
      els.dashboardPreview.className = `preview-grid ${activeSection}`;
      els.dashboardPreview.innerHTML = "";
      const maxItems = activeSection === "cameras" ? 1 : 12;
      list.slice(0, maxItems).forEach(item => {
        const card = document.createElement("div");
        card.className = "dash-card";
        if (activeSection === "controls") {
          card.innerHTML = `
            <div class="dash-name">${escapeHtml(item.name || "Control")}</div>
            <div class="dash-sub">${escapeHtml(item.subtitle || item.type || "button")}</div>
            <div class="dash-pill">${escapeHtml((item.type || "cmd").toUpperCase())}</div>
          `;
        }
        if (activeSection === "sensors") {
          card.innerHTML = `
            <div class="dash-name">${escapeHtml(item.label || "Sensor")}</div>
            <div class="dash-sub">${escapeHtml(item.device_id || item.topic || "")}</div>
            <div class="sensor-value">${escapeHtml(item.value || "--")}<span class="sensor-unit">${escapeHtml(item.unit || "")}</span></div>
          `;
        }
        if (activeSection === "cameras") {
          card.innerHTML = `
            <div class="camera-frame">MQTT IMAGE</div>
            <div class="dash-name">${escapeHtml(item.label || "Camera")}</div>
            <div class="dash-sub">${escapeHtml(item.device_id || "")}</div>
          `;
        }
        els.dashboardPreview.appendChild(card);
      });
      if (list.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = `${sectionLabel(activeSection)} 尚未新增卡片`;
        els.dashboardPreview.appendChild(empty);
      }
    }

    function renderEditor() {
      const oldList = document.querySelector(".card-list");
      if (oldList) oldList.remove();

      const holder = document.createElement("div");
      holder.className = "scroll card-list";
      const list = state[activeSection];
      if (list.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "按下新增卡片開始設定";
        holder.appendChild(empty);
      } else {
        list.forEach((item, index) => holder.appendChild(renderEditorCard(activeSection, item, index)));
      }

      const center = document.querySelector(".center-panel");
      center.appendChild(holder);
    }

    function renderEditorCard(section, item, index) {
      const card = document.createElement("article");
      card.className = "editor-card";
      card.classList.toggle("selected", selected[section] === index);

      const title = section === "controls" ? item.name : item.label;
      const meta = section === "controls" ? item.type : item.device_id;
      const head = document.createElement("div");
      head.className = "editor-card-head";
      head.innerHTML = `
        <div>
          <strong>${escapeHtml(title || `${sectionLabel(section)} ${index + 1}`)}</strong>
          <span>${escapeHtml(meta || "")}</span>
        </div>
        <div class="card-mini-actions">
          <button class="mini-btn" title="上移" data-action="up">↑</button>
          <button class="mini-btn" title="下移" data-action="down">↓</button>
          <button class="mini-btn" title="複製" data-action="copy">⧉</button>
          <button class="mini-btn" title="刪除" data-action="delete">×</button>
        </div>
      `;
      head.addEventListener("click", (event) => {
        const action = event.target.dataset.action;
        if (action === "up") return moveCard(section, index, -1);
        if (action === "down") return moveCard(section, index, 1);
        if (action === "copy") return duplicateCard(section, index);
        if (action === "delete") return removeCard(section, index);
        selected[section] = index;
        render();
      });
      card.appendChild(head);

      if (selected[section] === index) {
        const body = document.createElement("div");
        body.className = "editor-card-body";
        const template = document.getElementById(`${section.slice(0, -1)}EditorTemplate`);
        body.appendChild(template.content.cloneNode(true));
        bindItemFields(body, section, item);
        card.appendChild(body);
      }
      return card;
    }

    function bindItemFields(root, section, item) {
      root.querySelectorAll("[data-field]").forEach(input => {
        const key = input.dataset.field;
        if (input.type === "checkbox") {
          input.checked = item[key] !== false;
        } else {
          input.value = item[key] || "";
        }
        input.addEventListener("input", () => {
          item[key] = input.type === "checkbox" ? input.checked : input.value;
          if (section === "controls" && key === "type") {
            render();
          } else {
            renderBaseFields();
            renderPreview();
            renderJson();
            saveDraft();
          }
        });
      });

      if (section === "controls") {
        const type = item.type || "message";
        root.querySelectorAll(".control-onoff").forEach(el => el.classList.toggle("hidden", type !== "onoff"));
        root.querySelectorAll(".control-url").forEach(el => el.classList.toggle("hidden", type === "onoff"));
        root.querySelectorAll(".control-mqtt").forEach(el => el.classList.toggle("hidden", type === "url" || type === "message"));
      }
    }

    function renderJson() {
      const config = makeConfig();
      els.jsonOutput.value = JSON.stringify(config, null, 2);
      validateConfig(config);
    }

    function validateConfig(config) {
      const errors = [];
      if (!idPattern.test(config.device_id)) errors.push("Device ID 必須是 8 位大小寫英數字");
      if (!config.title) errors.push("標題列不可空白");
      if (config.controls.length > LIMITS.controls) errors.push(`Controls 超過 ${LIMITS.controls} 張`);
      if (config.sensors.length > LIMITS.sensors) errors.push(`Sensors 超過 ${LIMITS.sensors} 張`);
      if (config.cameras.length > LIMITS.cameras) errors.push(`Cameras 超過 ${LIMITS.cameras} 張`);
      config.controls.forEach((item, index) => {
        if (!item.id) errors.push(`Control ${index + 1} 缺少 id`);
        if (!item.name) errors.push(`Control ${index + 1} 缺少 name`);
        if (item.type === "onoff" && (!item.urlon || !item.urloff)) errors.push(`Control ${index + 1} onoff 需要 urlon/urloff`);
        if (["message", "url"].includes(item.type) && !item.url) errors.push(`Control ${index + 1} 需要 url`);
      });
      config.sensors.forEach((item, index) => {
        if (!item.Label) errors.push(`Sensor ${index + 1} 缺少 Label`);
        if (!item.Topic) errors.push(`Sensor ${index + 1} 缺少 Topic`);
        if (!item.Key) errors.push(`Sensor ${index + 1} 缺少 Key`);
      });
      config.cameras.forEach((item, index) => {
        if (!item.Label) errors.push(`Camera ${index + 1} 缺少 Label`);
        if (!item.DEVICE_ID) errors.push(`Camera ${index + 1} 缺少 DEVICE_ID`);
        if (!item.Topic) errors.push(`Camera ${index + 1} 缺少 Topic`);
      });
      if (errors.length) setStatus(errors.join("；"), "error");
      else setStatus(`JSON OK；文字圖形已自動產生；MQTT 發佈 topic: ${state.mqtt.response_prefix}/${state.device_id}`, "ok");
    }

    function setValue(input, value) {
      if (document.activeElement !== input) {
        input.value = value ?? "";
      }
    }

    function setStatus(text, type = "") {
      els.status.textContent = text;
      els.status.className = `status ${type}`;
    }

    function sectionLabel(section) {
      return section[0].toUpperCase() + section.slice(1);
    }

    function randomDeviceId() {
      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
      let id = "";
      crypto.getRandomValues(new Uint32Array(8)).forEach(n => {
        id += chars[n % chars.length];
      });
      return id;
    }

    function escapeHtml(text) {
      return String(text).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      })[char]);
    }

    function saveDraft() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function loadDraft() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) state = normalizeImportedConfig(JSON.parse(raw));
      } catch {
        state = clone(defaultState);
      }
    }

    function downloadJson() {
      const fileName = `${state.device_id || "device"}.json`;
      const blob = new Blob([els.jsonOutput.value], { type: "application/json;charset=utf-8" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      URL.revokeObjectURL(a.href);
      a.remove();
      setStatus(`已下載 ${fileName}`, "ok");
    }

    async function copyJson() {
      await navigator.clipboard.writeText(els.jsonOutput.value);
      setStatus("JSON 已複製", "ok");
    }

    function importJson(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          state = normalizeImportedConfig(JSON.parse(reader.result));
          selected = { controls: 0, sensors: 0, cameras: 0 };
          render();
          setStatus(`已匯入 ${file.name}`, "ok");
        } catch (error) {
          setStatus(`匯入失敗: ${error.message}`, "error");
        }
      };
      reader.readAsText(file, "utf-8");
    }

    function init() {
      loadDraft();
      bindBaseFields();
      document.querySelectorAll("[data-section], [data-section-tab]").forEach(btn => {
        btn.addEventListener("click", () => setActiveSection(btn.dataset.section || btn.dataset.sectionTab));
      });
      document.getElementById("addCardBtn").addEventListener("click", addCard);
      document.getElementById("randomIdBtn").addEventListener("click", () => {
        state.device_id = randomDeviceId();
        render();
      });
      document.getElementById("downloadBtn").addEventListener("click", downloadJson);
      document.getElementById("copyBtn").addEventListener("click", copyJson);
      document.getElementById("formatBtn").addEventListener("click", () => {
        try {
          state = normalizeImportedConfig(JSON.parse(els.jsonOutput.value));
          render();
          setStatus("JSON 已整理並同步到表單", "ok");
        } catch (error) {
          setStatus(`JSON 格式錯誤: ${error.message}`, "error");
        }
      });
      document.getElementById("bumpBtn").addEventListener("click", () => {
        state.version = Math.max(1, Number(state.version || 1)) + 1;
        render();
      });
      document.getElementById("loadSampleBtn").addEventListener("click", () => {
        state = clone(defaultState);
        selected = { controls: 0, sensors: 0, cameras: 0 };
        render();
      });
      document.getElementById("importFile").addEventListener("change", event => {
        const file = event.target.files[0];
        if (file) importJson(file);
        event.target.value = "";
      });
      els.jsonOutput.addEventListener("blur", () => {
        try {
          state = normalizeImportedConfig(JSON.parse(els.jsonOutput.value));
          render();
        } catch {
          validateConfig(makeConfig());
        }
      });
      render();
    }

    init();
  </script>
</body>
</html>
